services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enterprise-ai-agent-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    command:
      [
        "sh",
        "-c",
        "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    environment:
      APP_NAME: ${APP_NAME:-工业设备智能运维 AI Agent 平台}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      APP_ENV: ${APP_ENV:-demo}
      DEBUG: ${DEBUG:-false}
      ALLOW_CREATE_ALL: ${ALLOW_CREATE_ALL:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-agent}:${POSTGRES_PASSWORD:-agent_password}@postgres:5432/${POSTGRES_DB:-agentdb}}
      AUTH_ENABLED: ${AUTH_ENABLED:-false}
      PUBLIC_ENGINEER_REGISTRATION_ENABLED: ${PUBLIC_ENGINEER_REGISTRATION_ENABLED:-false}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CHROMA_HOST: ${CHROMA_HOST:-chromadb}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_COLLECTION_NAME: ${CHROMA_COLLECTION_NAME:-knowledge_chunks}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AGENT_RUNTIME_ENABLED: ${AGENT_RUNTIME_ENABLED:-true}
      EMBEDDING_MODEL_PATH: ${EMBEDDING_MODEL_PATH:-/app/models/bge-small-zh-v1.5}
      RERANKER_ENABLED: ${RERANKER_ENABLED:-false}
      RERANKER_MODEL_NAME: ${RERANKER_MODEL_NAME:-BAAI/bge-reranker-v2-m3}
      RERANKER_MODEL_PATH: ${RERANKER_MODEL_PATH:-}
      RERANKER_CANDIDATE_K: ${RERANKER_CANDIDATE_K:-20}
      RERANKER_BATCH_SIZE: ${RERANKER_BATCH_SIZE:-16}
      UPLOAD_DIRECTORY: /app/uploads
    volumes:
      - ./backend/data:/app/data
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
      - ./models:/app/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    mem_limit: 1g

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: enterprise-ai-agent-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    mem_limit: 256m

  chromadb:
    image: chromadb/chroma:1.5.9
    container_name: enterprise-ai-agent-chromadb
    ports:
      - "${CHROMA_HOST_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: unless-stopped
    mem_limit: 1g

  postgres:
    image: postgres:16-alpine
    container_name: enterprise-ai-agent-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agent_password}
      POSTGRES_DB: ${POSTGRES_DB:-agentdb}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agent} -d ${POSTGRES_DB:-agentdb}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    mem_limit: 512m

volumes:
  chroma_data:
  postgres_data:
